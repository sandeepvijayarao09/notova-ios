name: iOS CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Run Swift package tests
        run: |
          set -e
          for pkg in NotovaCore Transcription AISummary ModelManagement Integrations Persistence Keychain DesignSystem; do
            if [ -d "Packages/$pkg/Tests" ]; then
              echo "== swift test: $pkg =="
              ( cd "Packages/$pkg" && swift test )
            fi
          done

      - name: Build app (iOS Simulator)
        run: |
          xcodebuild \
            -project Notova.xcodeproj \
            -scheme Notova \
            -destination 'generic/platform=iOS Simulator' \
            build
