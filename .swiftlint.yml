disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - operator_usage_whitespace

excluded:
  - .build
  - "**/.build"
  - "**/*.generated.swift"
  - Notova.xcodeproj
  - DerivedData

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 900

identifier_name:
  min_length: 1
  excluded:
    - id
    - x
    - y

reporter: "xcode"
