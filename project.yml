name: Notova
options:
  bundleIdPrefix: com.notova
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  NotovaCore:
    path: Packages/NotovaCore
  AudioCapture:
    path: Packages/AudioCapture
  Transcription:
    path: Packages/Transcription
  AISummary:
    path: Packages/AISummary
  ModelManagement:
    path: Packages/ModelManagement
  Persistence:
    path: Packages/Persistence
  Integrations:
    path: Packages/Integrations
  DesignSystem:
    path: Packages/DesignSystem
  Keychain:
    path: Packages/Keychain

targets:
  Notova:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Resources
        optional: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Notova
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Notova needs microphone access to record audio for on-device transcription and summarization."
        NSSpeechRecognitionUsageDescription: "Notova uses speech recognition to transcribe your recordings entirely on your device."
        CFBundleURLTypes:
          - CFBundleURLName: com.notova.app.oauth
            CFBundleURLSchemes:
              - notova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notova.app
        PRODUCT_NAME: Notova
        INFOPLIST_KEY_CFBundleDisplayName: Notova
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: NotovaCore
      - package: AudioCapture
      - package: Transcription
      - package: AISummary
      - package: ModelManagement
      - package: Persistence
      - package: Integrations
      - package: DesignSystem
      - package: Keychain

  NotovaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppTests
    dependencies:
      - target: Notova
      - package: NotovaCore
      - package: ModelManagement
      - package: Transcription
      - package: AISummary
      - package: Persistence
      - package: Integrations
      - package: Keychain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notova.app.tests
        GENERATE_INFOPLIST_FILE: YES

  NotovaUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppUITests
    dependencies:
      - target: Notova
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notova.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Notova

schemes:
  Notova:
    build:
      targets:
        Notova: all
        NotovaTests: [test]
        NotovaUITests: [test]
    test:
      targets:
        - NotovaTests
        - NotovaUITests
      gatherCoverageData: true
